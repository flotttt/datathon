version: "3.8"

services:
  chroma:
    image: chromadb/chroma:latest
    container_name: datathon-chroma
    ports:
      - "8000:8000"
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma
      - ANONYMIZED_TELEMETRY=FALSE
    volumes:
      - ./chroma_data:/chroma/chroma
    restart: unless-stopped
